<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Past Winners &mdash; Cause Catalyst Awards</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #faf9f6; --surface: #fff; --ink: #1a1a1a; --ink-2: #4a4a4a; --ink-3: #8a8a8a; --green: #1b4332; --green-light: #2d6a4f; --green-pale: #edf5f0; --rule: #e5e3de; --amber: #b45309; }
  body { background: var(--bg); color: var(--ink); font-family: 'Space Grotesk', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }

  nav { position: sticky; top: 0; z-index: 50; background: var(--bg); border-bottom: 1px solid var(--rule); padding: 0 clamp(24px, 5vw, 80px); height: 56px; display: flex; align-items: center; justify-content: space-between; }
  .nav-name { font-size: 15px; font-weight: 600; color: var(--ink); text-decoration: none; }
  .nav-links { display: flex; align-items: center; gap: 28px; list-style: none; }
  .nav-links a { font-size: 13px; color: var(--ink-3); text-decoration: none; }
  .nav-links a:hover { color: var(--ink); }
  .nav-cta { color: var(--surface) !important; background: var(--green); padding: 7px 18px; border-radius: 4px; }

  .page-header { padding: clamp(48px, 6vw, 80px) clamp(24px, 5vw, 80px) clamp(32px, 4vw, 48px); max-width: 640px; }
  .page-header h1 { font-family: 'Newsreader', Georgia, serif; font-size: clamp(32px, 5vw, 48px); font-weight: 400; line-height: 1.1; margin-bottom: 12px; }
  .page-header p { font-size: 16px; color: var(--ink-2); line-height: 1.6; }

  .content { padding: 0 clamp(24px, 5vw, 80px) clamp(60px, 8vw, 100px); max-width: 1100px; margin: 0 auto; }

  .empty { border: 1px dashed var(--rule); border-radius: 6px; padding: 60px 40px; text-align: center; }
  .empty h2 { font-family: 'Newsreader', serif; font-size: 24px; font-weight: 400; margin-bottom: 8px; }
  .empty p { font-size: 15px; color: var(--ink-3); margin-bottom: 24px; }
  .btn-primary { display: inline-block; background: var(--green); color: var(--surface); padding: 12px 28px; font-family: inherit; font-size: 14px; font-weight: 500; text-decoration: none; border-radius: 4px; }
  .btn-primary:hover { background: var(--green-light); }

  .winners-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  .winner-card { background: var(--surface); border: 1px solid var(--rule); border-radius: 6px; padding: 28px; }
  .winner-card .year { font-size: 12px; font-weight: 500; color: var(--amber); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .winner-card h3 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
  .winner-card .org { font-size: 14px; color: var(--green); font-weight: 500; margin-bottom: 8px; }
  .winner-card .cat { font-size: 13px; color: var(--ink-3); }
  .winner-card .bio { font-size: 14px; color: var(--ink-2); line-height: 1.6; margin-top: 10px; }

  footer { border-top: 1px solid var(--rule); padding: 40px clamp(24px, 5vw, 80px); display: flex; justify-content: space-between; font-size: 13px; color: var(--ink-3); }
  footer a { color: var(--ink-2); text-decoration: none; margin-left: 24px; }

  @media (max-width: 768px) {
    .nav-links li:not(:last-child) { display: none; }
    footer { flex-direction: column; gap: 12px; text-align: center; }
    footer a { margin: 0 8px; }
  }
</style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-name">Cause Catalyst Awards</a>
  <ul class="nav-links">
    <li><a href="index.html#categories">Categories</a></li>
    <li><a href="past-winners.html" style="color:var(--ink)">Past Winners</a></li>
    <li><a href="nominate.html" class="nav-cta">Nominate</a></li>
  </ul>
</nav>

<div class="page-header">
  <h1>Past Winners</h1>
  <p>Organizations and leaders recognized for extraordinary impact.</p>
</div>

<div class="content">
  <div id="loading" style="text-align:center;padding:40px;color:var(--ink-3)">Loading...</div>
  <div id="winners-container"></div>
</div>

<footer>
  <span>&copy; 2025 Cause Catalyst Awards</span>
  <div><a href="index.html">Home</a><a href="nominate.html">Nominate</a><a href="index.html#categories">Categories</a></div>
</footer>

<script src="assets/js/praiz-api.js"></script>
<script>
  async function load() {
    const loading = document.getElementById('loading');
    const container = document.getElementById('winners-container');
    try {
      const winners = await PraizAPI.getWinners();
      loading.style.display = 'none';
      if (!winners || !winners.length) {
        container.innerHTML = '<div class="empty"><h2>Winners coming soon</h2><p>We\'re reviewing nominations. Winners will be announced when selection is complete.</p><a href="nominate.html" class="btn-primary">Submit a Nomination</a></div>';
        return;
      }
      container.innerHTML = '<div class="winners-grid">' + winners.map(w =>
        `<div class="winner-card"><div class="year">${w.year} Winner</div><h3>${w.display_name}</h3>${w.display_organization ? `<div class="org">${w.display_organization}</div>` : ''}<div class="cat">${w.category}</div>${w.display_bio ? `<p class="bio">${w.display_bio}</p>` : ''}</div>`
      ).join('') + '</div>';
    } catch { loading.innerHTML = '<p style="color:#dc2626">Unable to load winners.</p>'; }
  }
  load();
</script>
</body>
</html>
