<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reference &mdash; Cause Catalyst Awards</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300;1,6..72,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #faf9f6; --surface: #fff; --ink: #1a1a1a; --ink-2: #4a4a4a; --ink-3: #8a8a8a; --green: #1b4332; --green-light: #2d6a4f; --green-pale: #edf5f0; --rule: #e5e3de; --red: #dc2626; }
  body { background: var(--bg); color: var(--ink); font-family: 'Space Grotesk', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  .page-bar { background: var(--green); color: var(--surface); padding: 20px clamp(24px, 5vw, 80px); }
  .page-bar h1 { font-family: 'Newsreader', serif; font-size: 22px; font-weight: 400; }
  .page-bar p { font-size: 14px; opacity: 0.7; margin-top: 4px; }
  .container { max-width: 680px; margin: 0 auto; padding: clamp(32px, 4vw, 48px) clamp(24px, 5vw, 80px); }
  .card { background: var(--surface); border: 1px solid var(--rule); border-radius: 6px; padding: clamp(24px, 3vw, 36px); margin-bottom: 20px; }
  .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid var(--rule); }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 5px; }
  .field .req { color: var(--red); }
  .field input, .field textarea { width: 100%; padding: 10px 14px; border: 1px solid var(--rule); border-radius: 4px; font-family: inherit; font-size: 15px; background: var(--bg); }
  .field input:focus, .field textarea:focus { outline: none; border-color: var(--green); }
  .field textarea { min-height: 120px; resize: vertical; line-height: 1.6; }
  .field-hint { font-size: 13px; color: var(--ink-3); margin-top: 4px; }
  .btn-submit { background: var(--green); color: var(--surface); padding: 12px 28px; border: none; border-radius: 4px; font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; }
  .btn-submit:hover { background: var(--green-light); }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .form-error { display: none; background: #fef2f2; border: 1px solid #fca5a5; border-radius: 4px; padding: 12px; margin-bottom: 16px; color: var(--red); font-size: 14px; }
  .form-success { display: none; background: var(--green-pale); border-radius: 6px; padding: 32px; text-align: center; color: var(--green); }
  .loading { text-align: center; padding: 60px 20px; color: var(--ink-3); }
</style>
</head>
<body>
<div class="page-bar">
  <h1>Reference Recommendation</h1>
  <p>Your feedback helps us identify outstanding leaders in human services.</p>
</div>
<div class="container">
  <div id="loading" class="loading">Loading...</div>
  <form id="reference-form" style="display:none">
    <div class="card">
      <h2>Your Recommendation</h2>
      <div class="field"><label>How long have you known the nominee? <span class="req">*</span></label><input name="how_long_known" required placeholder="e.g. 5 years"></div>
      <div class="field"><label>Nominee's greatest strengths <span class="req">*</span></label><textarea name="nominee_strengths" required minlength="20" placeholder="Key strengths related to their work and impact..."></textarea><p class="field-hint">Min 20 characters</p></div>
      <div class="field"><label>Impact the nominee has had <span class="req">*</span></label><textarea name="nominee_impact" required minlength="20" placeholder="Specific outcomes, changes, or measurable results..."></textarea><p class="field-hint">Min 20 characters</p></div>
      <div class="field"><label>Your recommendation <span class="req">*</span></label><textarea name="recommendation_text" required minlength="20" placeholder="Why do you recommend them for the Cause Catalyst Awards?"></textarea><p class="field-hint">Min 20 characters</p></div>
      <div class="field"><label>Additional comments</label><textarea name="additional_comments" style="min-height:80px" placeholder="Anything else..."></textarea></div>
    </div>
    <div id="form-error" class="form-error"></div>
    <button type="submit" class="btn-submit" id="submit-btn">Submit Recommendation</button>
    <div id="form-success" class="form-success">Thank you for your recommendation.</div>
  </form>
</div>
<script src="assets/js/praiz-api.js"></script>
<script>
  const token = new URLSearchParams(location.search).get('token') || location.pathname.split('/').filter(Boolean).pop();
  async function init() {
    if (!token || token === 'reference-form.html') { document.getElementById('loading').innerHTML = '<p style="color:var(--red)">No token. Use the link from your email.</p>'; return; }
    document.getElementById('loading').style.display = 'none';
    document.getElementById('reference-form').style.display = 'block';
  }
  document.getElementById('reference-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn'), err = document.getElementById('form-error');
    err.style.display = 'none'; btn.disabled = true; btn.textContent = 'Submitting...';
    const data = {}; new FormData(this).forEach((v, k) => { if (v) data[k] = v; });
    try { await PraizAPI.submitReference(token, data); this.style.display = 'none'; document.getElementById('form-success').style.display = 'block'; }
    catch (e) { err.innerHTML = e.error || 'Something went wrong.'; err.style.display = 'block'; btn.disabled = false; btn.textContent = 'Submit Recommendation'; }
  });
  init();
</script>
</body>
</html>
