<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reference Recommendation — Cause Catalyst Awards</title>
  <meta name="theme-color" content="#132b1e">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;0,900;1,400;1,700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --forest: #132b1e;
      --forest-mid: #1e4030;
      --forest-light: #2a5542;
      --gold: #c8973a;
      --gold-light: #e8b85a;
      --cream: #f7f2e9;
      --cream-dim: #d9cfbb;
      --ink: #0e1f16;
      --border: rgba(200,151,58,0.2);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Jost', sans-serif;
      background: var(--forest);
      color: var(--cream);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }
    .serif { font-family: 'Playfair Display', Georgia, serif; }

    .page-header {
      padding: 2.5rem 4rem;
      background: var(--ink);
      border-bottom: 1px solid var(--border);
      text-align: center;
    }
    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 500;
      color: var(--gold-light);
    }
    .page-header p {
      color: var(--cream-dim);
      font-size: 0.9rem;
      margin-top: 0.35rem;
    }

    .form-container {
      max-width: 720px;
      margin: 2rem auto;
      padding: 0 1.5rem 3rem;
    }
    .form-card {
      background: var(--forest-mid);
      border-radius: 20px;
      padding: 2.5rem;
      border: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    .form-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 400;
      color: var(--gold-light);
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .field { margin-bottom: 1.25rem; }
    .field label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 0.4rem;
      color: var(--cream);
    }
    .field input, .field textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-family: 'Jost', sans-serif;
      font-size: 0.95rem;
      background: var(--forest);
      color: var(--cream);
      transition: border-color 0.2s;
    }
    .field input::placeholder, .field textarea::placeholder {
      color: var(--cream-dim);
      opacity: 0.6;
    }
    .field input:focus, .field textarea:focus {
      outline: none;
      border-color: var(--gold);
    }
    .field textarea { min-height: 120px; resize: vertical; }
    .required { color: var(--gold); }
    .field-hint { font-size: 0.8rem; color: var(--cream-dim); margin-top: 0.3rem; }

    .btn-submit {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      padding: 1rem 2rem;
      background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
      color: var(--ink);
      border: none;
      font-family: 'Jost', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(200, 151, 58, 0.3);
    }
    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(200, 151, 58, 0.4);
    }
    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .form-error {
      background: rgba(220, 38, 38, 0.15);
      border: 1px solid rgba(220, 38, 38, 0.4);
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
      color: #fca5a5;
      font-size: 0.9rem;
    }
    .form-success {
      display: none;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      border-radius: 16px;
      padding: 2rem;
      text-align: center;
      color: #86efac;
      font-size: 1rem;
    }
    .loading { text-align: center; padding: 4rem 2rem; color: var(--cream-dim); }

    @media (max-width: 640px) {
      .form-card { padding: 1.5rem; }
      .page-header { padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="page-header">
    <h1 class="serif">Reference Recommendation</h1>
    <p>Your feedback helps us identify outstanding catalysts for positive change.</p>
  </div>

  <div class="form-container">
    <div id="loading" class="loading">Loading...</div>

    <form id="reference-form" style="display:none;">
      <div class="form-card">
        <h2>Your Recommendation</h2>
        <div class="field">
          <label for="how_long_known">How long have you known the nominee? <span class="required">*</span></label>
          <input id="how_long_known" name="how_long_known" type="text" placeholder="e.g. 5 years" required>
        </div>
        <div class="field">
          <label for="nominee_strengths">What are the nominee's greatest strengths? <span class="required">*</span></label>
          <textarea id="nominee_strengths" name="nominee_strengths" placeholder="Describe their key strengths, especially related to catalyzing positive change in their community..." required minlength="20"></textarea>
          <p class="field-hint">Minimum 20 characters</p>
        </div>
        <div class="field">
          <label for="nominee_impact">What impact has the nominee had? <span class="required">*</span></label>
          <textarea id="nominee_impact" name="nominee_impact" placeholder="Describe specific outcomes, changes, or measurable results from their work..." required minlength="20"></textarea>
          <p class="field-hint">Minimum 20 characters</p>
        </div>
        <div class="field">
          <label for="recommendation_text">Your recommendation <span class="required">*</span></label>
          <textarea id="recommendation_text" name="recommendation_text" placeholder="Why do you recommend this person for the Cause Catalyst Awards?" required minlength="20"></textarea>
          <p class="field-hint">Minimum 20 characters</p>
        </div>
        <div class="field">
          <label for="additional_comments">Additional comments</label>
          <textarea id="additional_comments" name="additional_comments" placeholder="Anything else you'd like the judges to know..." style="min-height:80px;"></textarea>
        </div>
      </div>

      <div id="form-error" class="form-error" style="display:none;"></div>

      <button type="submit" class="btn-submit" id="submit-btn">
        Submit Recommendation
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="5" y1="12" x2="19" y2="12"></line>
          <polyline points="12 5 19 12 12 19"></polyline>
        </svg>
      </button>

      <div id="form-success" class="form-success">
        Thank you for your recommendation! Your feedback is invaluable to the selection process.
      </div>
    </form>
  </div>

  <script src="assets/js/praiz-api.js"></script>
  <script>
    const token = new URLSearchParams(window.location.search).get('token')
      || window.location.pathname.split('/').filter(Boolean).pop();

    async function init() {
      if (!token || token === 'reference-form.html') {
        document.getElementById('loading').innerHTML = '<p style="color:#fca5a5;">No token provided. Please use the link from your email.</p>';
        return;
      }
      document.getElementById('loading').style.display = 'none';
      document.getElementById('reference-form').style.display = 'block';
    }

    document.getElementById('reference-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      const errorEl = document.getElementById('form-error');
      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Submitting...';

      const fd = new FormData(this);
      const data = {};
      for (const [key, val] of fd.entries()) {
        if (val) data[key] = val;
      }

      try {
        await PraizAPI.submitReference(token, data);
        this.style.display = 'none';
        document.getElementById('form-success').style.display = 'block';
      } catch (err) {
        let msg = 'Something went wrong. Please try again.';
        if (err.error) msg = err.error;
        if (err.details?.fieldErrors) {
          msg = Object.entries(err.details.fieldErrors).map(([k, v]) => `${k}: ${v.join(', ')}`).join('<br>');
        }
        errorEl.innerHTML = msg;
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Submit Recommendation';
      }
    });

    init();
  </script>
</body>
</html>
